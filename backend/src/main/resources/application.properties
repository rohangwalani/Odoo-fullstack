spring.application.name=backend
spring.profiles.active=local

# ============================================================
# MySQL Database Configuration
# IMPORTANT: MySQL service is MySQL4408 running on port 4408
# In MySQL Workbench, edit Odoo-Hackathon -> change Port to 4408
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT:4408}/${DB_NAME:hackathon_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Hibernate / JPA Configuration
# ddl-auto=update: Hibernate auto-creates/updates tables on startup
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# SQL Init — Disabled (Hibernate manages DDL via ddl-auto=update)
# schema.sql is kept for reference ONLY; NOT executed at startup
# ============================================================
spring.sql.init.mode=never

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Mailtrap SMTP Configuration (Email Testing)
# Inbox: https://mailtrap.io -> Email Testing -> My Inbox
# ============================================================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# Redis Configuration (for 2FA OTP and rate limiting)
# Default: localhost:6379 — safe to use as-is for local dev
# Override with REDIS_HOST / REDIS_PORT env vars if needed
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
