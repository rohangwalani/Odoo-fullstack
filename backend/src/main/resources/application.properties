spring.application.name=backend

# ============================================================
# MySQL Database Configuration
# Set DB_USER and DB_PASS as environment variables (or .env)
# MySQL service: MySQL4408 running on port 4408
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:${DB_PORT:4408}/${DB_NAME:hackathon_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Hibernate / JPA Configuration
# ddl-auto=update: Hibernate auto-creates/updates tables on startup
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Mailtrap SMTP Configuration (Email Testing)
# Get these from: mailtrap.io -> Email Testing -> My Inbox -> SMTP Settings
# Set as environment variables: MAIL_USER and MAIL_PASS
# ============================================================
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USER:your_mailtrap_username}
spring.mail.password=${MAIL_PASS:your_mailtrap_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
